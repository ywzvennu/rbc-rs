name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings

jobs:
  test:
    name: stable / fmt + clippy + test + doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - run: cargo doc --no-deps --all-features

  msrv:
    # Verifies the library compiles on the declared MSRV. Scoped to
    # `cargo check --lib` because dev-deps (criterion, clap, ...) drag
    # in toolchain requirements that are newer than this crate's MSRV.
    name: msrv (1.80) / library check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.80.0
      - run: cargo check --all-features --lib
      - run: cargo check --no-default-features --lib
